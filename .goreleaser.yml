version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test -race ./...

builds:
  - main: ./cmd/homelab
    binary: homelab
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: VitruvianSoftware
    name: homelab
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
