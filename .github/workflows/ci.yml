name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Verify & Vet
        run: |
          go mod verify
          go vet ./...
      - name: Test
        run: mise run test
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Lint
        run: mise run lint

  build:
    name: Build
    runs-on: macos-latest
    needs: [test, lint]
    strategy:
      matrix:
        goos: [darwin]
        goarch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mise run build
          mv homelab homelab-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: homelab-${{ matrix.goos }}-${{ matrix.goarch }}
          path: homelab-${{ matrix.goos }}-${{ matrix.goarch }}
