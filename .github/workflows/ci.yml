name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded PR runs; never cancel push-to-main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Verify & Vet
        run: |
          go mod verify
          go vet ./...
      - name: Test
        run: mise run test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Lint
        run: mise run lint

  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [test, lint]
    strategy:
      matrix:
        goos: [darwin]
        goarch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mise run build
          mv homelab homelab-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: homelab-${{ matrix.goos }}-${{ matrix.goarch }}
          path: homelab-${{ matrix.goos }}-${{ matrix.goarch }}

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - run: go install github.com/google/addlicense@v1.2.0
      - name: Check license headers
        # go install drops the binary in GOPATH/bin, which isn't on PATH on the runner.
        run: '"$(go env GOPATH)/bin/addlicense" -check -c "VitruvianSoftware" -l mit .'
