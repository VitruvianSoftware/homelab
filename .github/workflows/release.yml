# Publish-on-version-bump. The monorepo (vitruvian-core) authors homelab's
# version bump via release-please; the bumped .release-please-manifest.json is
# exported here. When the version has no matching tag yet, this is a new release:
# tag the exported commit and publish with GoReleaser using the mirror's existing
# token. Replaces the in-mirror release-please job (now in the monorepo). Never
# authors source; only tags + ships.
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

      - id: detect
        name: Detect a new release from the exported manifest
        run: |
          if [ ! -f .release-please-manifest.json ]; then
            echo "No manifest yet -- monorepo release-please has not cut a release."
            exit 0
          fi
          V="$(jq -r 'to_entries[0].value' .release-please-manifest.json)"
          if [ -z "$V" ] || [ "$V" = "null" ]; then
            echo "No version in manifest."
            exit 0
          fi
          if git rev-parse "v$V" >/dev/null 2>&1; then
            echo "v$V already released -- nothing to do."
          else
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "Detected new release v$V."
          fi

      - name: Tag the exported release commit
        if: steps.detect.outputs.version
        run: |
          V="${{ steps.detect.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$V" -m "Release v$V"
          git push origin "v$V"

      - name: Setup environment with Mise
        if: steps.detect.outputs.version
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Run GoReleaser
        if: steps.detect.outputs.version
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
